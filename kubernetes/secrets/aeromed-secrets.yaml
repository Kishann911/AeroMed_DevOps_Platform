# =============================================================================
# AeroMed — Secrets (Opaque)
#
# !! PLACEHOLDER VALUES — DO NOT USE IN PRODUCTION !!
#
# For production deployments, NEVER commit real secrets to Git.
# Recommended approaches (in order of preference):
#
#   1. AWS Secrets Manager + External Secrets Operator (ESO):
#      Install ESO, create an ExternalSecret that syncs from:
#      arn:aws:secretsmanager:us-east-1:ACCOUNT:secret:aeromed/production/app
#
#   2. HashiCorp Vault + Vault Agent Injector:
#      Annotate pods with vault.hashicorp.com/agent-inject-secret-* annotations
#
#   3. AWS Parameter Store + SSM Agent sidecar
#
#   4. Sealed Secrets (Bitnami) — encrypt then commit the SealedSecret CRD
#
# Rotate ALL values below before any production deployment.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: aeromed-secrets
  namespace: aeromed-production
  labels:
    app.kubernetes.io/name: aeromed-secrets
    app.kubernetes.io/part-of: aeromed-platform
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "AeroMed application secrets — PLACEHOLDER VALUES ONLY"
    secret-management: "For production: use AWS Secrets Manager or HashiCorp Vault"
    rotation-policy: "Rotate every 90 days per HIPAA security requirements"
    last-rotated: "NEVER — replace with actual rotation date"
type: Opaque
data:
  # PostgreSQL master password
  # Plaintext equivalent: aeromed-db-password-CHANGE-IN-PRODUCTION
  DB_PASSWORD: YWVyb21lZC1kYi1wYXNzd29yZC1DSEFOR0UtSU4tUFJPRFVDVElPTg==

  # HMAC signing key for API authentication tokens (min 32 chars)
  # Plaintext equivalent: aeromed-api-secret-key-CHANGE-IN-PRODUCTION-min-32-chars
  API_SECRET_KEY: YWVyb21lZC1hcGktc2VjcmV0LWtleS1DSEFOR0UtSU4tUFJPRFVDVElPTi1taW4tMzItY2hhcnM=

  # AES-256 encryption key for data at rest (application-level, separate from KMS)
  # Plaintext equivalent: aeromed-aes256-encryption-key-CHANGE-IT-NOW
  ENCRYPTION_KEY: YWVyb21lZC1hZXMyNTYtZW5jcnlwdGlvbi1rZXktQ0hBTkdFLUlULU5PVw==

  # Bearer token for aircraft telemetry WebSocket authentication
  # Plaintext equivalent: aeromed-aircraft-bearer-token-CHANGE-IN-PRODUCTION
  AIRCRAFT_COMMS_TOKEN: YWVyb21lZC1haXJjcmFmdC1iZWFyZXItdG9rZW4tQ0hBTkdFLUlOLVBST0RVQ1RJT04=

  # PHI field-level encryption key (separate from ENCRYPTION_KEY for audit isolation)
  # Plaintext equivalent: aeromed-phi-encryption-key-CHANGE-IN-PRODUCTION-32b
  MEDICAL_RECORDS_ENCRYPTION_KEY: YWVyb21lZC1waGktZW5jcnlwdGlvbi1rZXktQ0hBTkdFLUlOLVBST0RVQ1RJT04tMzJi

---
# =============================================================================
# TLS Secret — self-signed cert for aeromed.local (local dev only)
# For production: use cert-manager with Let's Encrypt or ACM certificates
# Generate locally:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout aeromed.key -out aeromed.crt \
#     -subj "/CN=aeromed.local/O=AeroMed"
#   kubectl create secret tls aeromed-tls \
#     --key aeromed.key --cert aeromed.crt \
#     -n aeromed-production
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: aeromed-tls
  namespace: aeromed-production
  labels:
    app.kubernetes.io/name: aeromed-tls
    app.kubernetes.io/part-of: aeromed-platform
  annotations:
    description: "TLS certificate for aeromed.local — REPLACE with real cert in production"
    cert-manager: "For production: annotate with cert-manager.io/cluster-issuer: letsencrypt-prod"
type: kubernetes.io/tls
data:
  # Placeholder — replace with real base64-encoded certificate and key
  # kubectl create secret tls aeromed-tls --cert=aeromed.crt --key=aeromed.key
  tls.crt: UExBQ0VIT0xERVJfQ0VSVElGSUNBVEVfUkVQTEFDRV9NRQ==
  tls.key: UExBQ0VIT0xERVJfUFJJVkFURV9LRVlfUkVQTEFDRV9NRQ==
