# =============================================================================
# AeroMed — Flight Operations Service Deployment
# Tracks active air ambulance flights, altitude, speed, ETA
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-operations
  namespace: aeromed-production
  labels:
    app: flight-operations
    tier: backend
    criticality: high
    app.kubernetes.io/name: flight-operations
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: microservice
    app.kubernetes.io/part-of: aeromed-platform
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "Manages active flight tracking for air ambulance operations"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-operations
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # Zero downtime — active flights must never lose tracking
  template:
    metadata:
      labels:
        app: flight-operations
        tier: backend
        criticality: high
        app.kubernetes.io/name: flight-operations
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "5001"
    spec:
      terminationGracePeriodSeconds: 60   # Allow in-flight operations to complete
      serviceAccountName: default
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - flight-operations
                topologyKey: kubernetes.io/hostname
      containers:
        - name: flight-operations
          image: aeromed/flight-operations:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "flight-operations"
            - name: PORT
              value: "5001"
            - name: ENV
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: aeromed-config
            - secretRef:
                name: aeromed-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: flight-operations
