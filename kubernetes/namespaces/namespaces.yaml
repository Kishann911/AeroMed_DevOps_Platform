# =============================================================================
# AeroMed — Namespaces
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: aeromed-production
  labels:
    tier: production
    criticality: high
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "AeroMed critical care air ambulance production workloads"
    contact: "aeromed-devops-team@example.com"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aeromed-production-quota
  namespace: aeromed-production
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: aeromed-production-limits
  namespace: aeromed-production
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "50m"
        memory: "64Mi"

---
apiVersion: v1
kind: Namespace
metadata:
  name: aeromed-staging
  labels:
    tier: staging
    criticality: medium
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "AeroMed pre-production staging environment"
    contact: "aeromed-devops-team@example.com"

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: aeromed-staging-quota
  namespace: aeromed-staging
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
    services: "10"

---
apiVersion: v1
kind: Namespace
metadata:
  name: aeromed-monitoring
  labels:
    tier: monitoring
    criticality: high
    app.kubernetes.io/managed-by: kubectl
  annotations:
    description: "AeroMed observability stack — Prometheus, Grafana, AlertManager"
    contact: "aeromed-devops-team@example.com"
