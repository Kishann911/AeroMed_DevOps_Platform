# ---------------------------------------------------------------------------
# Emergency Dispatch HPA
# Most latency-sensitive service — scale-up must be near-instant for P1 events
# ---------------------------------------------------------------------------
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: emergency-dispatch-hpa
  namespace: aeromed-production
  labels:
    app: emergency-dispatch
    app.kubernetes.io/part-of: aeromed-platform
  annotations:
    description: "Scales dispatch coordination during simultaneous P1 emergency events"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: emergency-dispatch
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 400Mi
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Fastest possible — P1 response time is critical
      selectPolicy: Max
      policies:
        - type: Pods
          value: 4             # Allow larger bursts for mass-casualty events
          periodSeconds: 60
        - type: Percent
          value: 200
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

