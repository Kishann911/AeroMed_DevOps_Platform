# =============================================================================
# AeroMed — HorizontalPodAutoscalers for all 6 services
#
# Scale-up is fast (30s stabilization) to handle emergency call surges.
# Scale-down is slow (300s stabilization) to avoid flapping and ensure
# in-progress medical operations are never interrupted by pod termination.
#
# All HPAs target:
#   CPU:    70% average utilization
#   Memory: 400Mi average value
#   Min: 2 replicas (HA floor — healthcare requires constant availability)
#   Max: 10 replicas (autoscaling ceiling)
# =============================================================================

# ---------------------------------------------------------------------------
# API Gateway HPA
# Handles all inbound traffic — first to scale under external load
# ---------------------------------------------------------------------------
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: aeromed-production
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: aeromed-platform
  annotations:
    description: "Scales the API gateway during high-traffic dispatch events"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 400Mi
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Fast — emergency surges need immediate capacity
      selectPolicy: Max
      policies:
        - type: Pods
          value: 3
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Slow — avoid flapping, protect in-flight requests
      selectPolicy: Min
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

